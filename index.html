                <!-- JS to handle submission without page reload -->
                <script>
                    document.getElementById('contactForm').addEventListener('submit', function (e) {
                        e.preventDefault();
                        const form = e.target;
                        const data = new FormData(form);
                        const responseDiv = document.getElementById('formResponse');

                        fetch(form.action, {
                            method: form.method,
                            body: data,
                            headers: { 'Accept': 'application/json' }
                        }).then(response => {
                            if (response.ok) {
                                responseDiv.innerHTML = '<p class="text-success fw-bold">Message sent successfully! I will reply soon.</p>';
                                form.reset();
                            } else {
                                responseDiv.innerHTML = '<p class="text-danger fw-bold">Oops! Something went wrong. Please try again.</p>';
                            }
                        }).catch(error => {
                            responseDiv.innerHTML = '<p class="text-danger fw-bold">Oops! Something went wrong. Please try again.</p>';
                        });
                    });
                </script>

    <!--Nabbar Js Start-->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sections = document.querySelectorAll("section[id]");
            const navLinks = document.querySelectorAll(".navbar .nav-link");
            const navbar = document.getElementById('topNav'); // Make sure this ID matches your HTML
            const toggler = document.querySelector('.navbar-toggler');
            let isScrolling = false;

            function activateMenu() {
                if (isScrolling) return;

                let scrollY = window.pageYOffset + 120;

                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    const sectionHeight = section.offsetHeight;
                    const sectionId = section.getAttribute("id");

                    if (scrollY >= sectionTop && scrollY < sectionTop + sectionHeight) {
                        navLinks.forEach(link => {
                            link.classList.remove("active");
                            if (link.getAttribute("href").includes(sectionId)) {
                                link.classList.add("active");
                            }
                        });
                    }
                });
            }

            window.addEventListener("scroll", activateMenu);

            navLinks.forEach(link => {
                link.addEventListener("click", function () {
                    // 1. Highlight the clicked link immediately
                    isScrolling = true;
                    navLinks.forEach(l => l.classList.remove("active"));
                    this.classList.add("active");

                    // 2. AUTO-HIDE the mobile menu
                    if (navbar && navbar.classList.contains('show')) {
                        navbar.classList.remove('show');
                        if (toggler) {
                            toggler.setAttribute('aria-expanded', 'false');
                            toggler.classList.add('collapsed');
                        }
                    }

                    // 3. Reset scroll listener after movement finishes
                    setTimeout(() => { isScrolling = false; }, 1000);
                });
            });
        });
    </script>

    <!--Nabbar Js End-->
